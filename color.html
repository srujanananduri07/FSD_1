<!DOCTYPE html>
<html>
<head>
    <title>CSS Color References</title>
    <style>
        /* Color name */
        .colorName {
            background-color: red;
            color: white;
            padding: 10px;
        }

        /* Sravanthi */
        .redColor {
            background-color: red;
            padding: 10px;
        }

        /* Thrisha */
        .greenColor {
            background-color:green;
            color: white;
            padding: 10px;
        }

        /* Prasuna */
        .blueColor {
            background-color: blue;
            padding: 10px;
        }

        /* RGB */
        .rgbColor {
            background-color: rgb(200, 100%, 50%);
            color: black;
            padding: 10px;
        }

        /* Srujana */
        .pinkColor {
            background-color: pink;
            padding: 10px;
        }
    </style>
</head>
<body>

    <h2>Different CSS Color References</h2>

    <p class="colorName">Color Name Example</p>
    <p class="redColor">Sravanthi</p>
    <p class="greenColor">Trisha</p>
    <p class="blueColor">Prasuna</p>
    <p class="rgbColor">RGB Color Example</p>
    <p class="pinkColor">Srujana</p>

</body>
</html>
