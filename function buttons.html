<!DOCTYPE html>
<html>
<head>
<title>Functions with Buttons</title>

<script>

function getNumber(){
return parseInt(document.getElementById("num").value);
}

function factorial(){
let n = getNumber();
let fact=1;
for(let i=1;i<=n;i++)
fact*=i;

document.getElementById("result").innerHTML="Factorial = "+fact;
}

function fibonacci(){
let n = getNumber();
let a=0,b=1,c;
let series="0 1 ";

for(let i=2;i<n;i++){
c=a+b;
series += c + " ";
a=b;
b=c;
}

document.getElementById("result").innerHTML="Fibonacci: "+series;
}

function prime(){
let n=getNumber();
let res="";

for(let i=2;i<=n;i++){
let flag=1;
for(let j=2;j<i;j++){
if(i%j==0){
flag=0;
break;
}
}
if(flag==1)
res += i + " ";
}

document.getElementById("result").innerHTML="Primes: "+res;
}

function palindrome(){
let n=getNumber();
let temp=n,rev=0;

while(n>0){
rev=rev*10+n%10;
n=Math.floor(n/10);
}

if(temp==rev)
document.getElementById("result").innerHTML="Palindrome Number";
else
document.getElementById("result").innerHTML="Not a Palindrome";
}

</script>
</head>

<body>

<h3>Enter Number</h3>

<input type="text" id="num">

<br><br>

<button onclick="factorial()">Factorial</button>
<button onclick="fibonacci()">Fibonacci</button>
<button onclick="prime()">Prime</button>
<button onclick="palindrome()">Palindrome</button>

<p id="result"></p>

</body>
</html>
