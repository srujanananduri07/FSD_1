<!DOCTYPE html>
<html>
<head>
    <title>Internal and External JavaScript</title>

    <!-- External JavaScript -->
    <script src="script.js"></script>
       function externalFunction() {
    document.getElementById("external").innerHTML =
        "This text is changed using External JavaScript.";
}


    <!-- Internal JavaScript -->
    <script>
        function internalFunction() {
            document.getElementById("internal").innerHTML =
                "This text is changed using Internal JavaScript.";
        }
    </script>

</head>
<body>

    <h2>JavaScript Demonstration</h2>

    <p id="internal">Internal JavaScript Output</p>
    <button onclick="internalFunction()">Internal JS</button>

    <br><br>

    <p id="external">External JavaScript Output</p>
    <button onclick="externalFunction()">External JS</button>

</body>
</html>
