<!DOCTYPE html>
<html>
<head>
    <title>Ways to Display Output</title>
    <script>
        function showOutputs() {
            // 1. Using document.write()
            document.write("<h3>1. Using document.write()</h3>");
            document.write("Hello, this is document.write() output.<br><br>");

            // 2. Using innerHTML
            document.getElementById("output").innerHTML =
                "<h3>2. Using innerHTML</h3>Hello, this is innerHTML output.<br><br>";

            // 3. Using alert()
            alert("3. This is alert() output");

            // 4. Using console.log()
            console.log("4. This is console.log() output");
        }
    </script>
</head>
<body>

    <h2>JavaScript Output Methods</h2>

    <p id="output"></p>

    <button onclick="showOutputs()">Click to Show Outputs</button>

</body>
</html>
