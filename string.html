<!DOCTYPE html>
<html>
<body>

<script>
let text = "JavaScript Programming";

// Property
document.write("Length: " + text.length + "<br>");

// Methods
document.write("Uppercase: " + text.toUpperCase() + "<br>");
document.write("Substring: " + text.substring(0,10) + "<br>");
document.write("Replace: " + text.replace("Programming","Language"));
</script>

</body>
</html>
