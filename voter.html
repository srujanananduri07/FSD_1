DOCTYPE html>
<html>
<head>
    <title>Voter Eligibility</title>
    <style>
        table {
            border-collapse: collapse;
            width: 50%;
            margin-top: 20px;
        }
        table, th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

<h2>Voter Information</h2>

<script>
    // Taking input using prompt dialog box
    var name = prompt("Enter your name:");
    var age = prompt("Enter your age:");

    age = parseInt(age); // Convert age to number

    var status;

    // Check voting eligibility (18 years and above)
    if (age >= 18) {
        status = "Eligible to Vote";
    } else {
        status = "Not Eligible to Vote";
    }

    // Displaying output in table format
    document.write("<table>");
    document.write("<tr><th>Name</th><th>Age</th><th>Voting Status</th></tr>");
    document.write("<tr>");
    document.write("<td>" + name + "</td>");
    document.write("<td>" + age + "</td>");
    document.write("<td>" + status + "</td>");
    document.write("</tr>");
    document.write("</table>");
</script>

</body>
</html>
